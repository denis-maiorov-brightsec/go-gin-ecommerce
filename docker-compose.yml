services:
  postgres:
    image: postgres:16-alpine
    container_name: go-gin-ecommerce-postgres
    environment:
      POSTGRES_DB: go_gin_ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d go_gin_ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
